[Service]
# The ADSP-regenerated sns_secure_database.bin does NOT survive a reboot: on a
# fresh boot the sensor PD tries to HMAC-verify its own stale DB and fatals at
# sns_registry_sensor.c:279. It only REGENERATES (no crash) when it finds a
# foreign (Windows/Microsoft-format) DB. So seed that foreign DB before every
# attach -> the ADSP regenerates fresh each boot -> SSC comes up cleanly.
ExecStartPre=/bin/sh -c 'cp -f /var/lib/droid-juicer/sensors/sns-secure-db-seed.bin /var/lib/droid-juicer/sensors/sensors/registry/sns_secure_database.bin && chown fastrpc:fastrpc /var/lib/droid-juicer/sensors/sensors/registry/sns_secure_database.bin'
