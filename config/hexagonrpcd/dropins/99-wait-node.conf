[Service]
# Boot race fix: at boot the fastrpc node appears ~6s after this service first
# tries to start, so the bare ExecStart used to fail. Wait for the node (up to
# ~60s) before exec, and retry the unit on failure so the SSC comes up cleanly
# on its own.
ExecStartPre=/bin/sh -c 'i=0; while [ $i -lt 120 ]; do if [ -e /dev/fastrpc-adsp-secure ] || [ -e /dev/fastrpc-adsp ]; then exit 0; fi; sleep 0.5; i=$((i+1)); done; echo "fastrpc-adsp node never appeared"; exit 1'
Restart=on-failure
RestartSec=3
